[package]
name = "moq-token-cli"
description = "Media over QUIC - Token Generation and Validation"
authors = ["Luke Curley"]
repository = "https://github.com/moq-dev/moq"
license = "MIT OR Apache-2.0"

version = "0.5.12"
edition = "2024"

[[bin]]
name = "moq-token"
path = "src/bin.rs"
doc = false

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
moq-token = { workspace = true }
