[package]
name = "moq-rtmp"
description = "RTMP / enhanced-RTMP contribution ingest gateway for Media over QUIC"
authors = ["Luke Curley <kixelated@gmail.com>"]
repository = "https://github.com/moq-dev/moq"
license = "MIT OR Apache-2.0"

version = "0.0.1"
edition = "2024"
rust-version.workspace = true

keywords = ["rtmp", "moq", "media", "live", "flv"]
categories = ["multimedia", "network-programming", "web-programming"]

[lib]
doctest = false

[features]
default = ["tls"]
# RTMPS (RTMP over TLS): the `Conn::Tls` variant, `Server::with_tls`,
# `Config::tls`, and the `pub use rustls`. Plaintext RTMP needs none of this, so
# an embedder can drop TLS with `default-features = false`.
tls = ["dep:rustls", "dep:tokio-rustls"]

# Pure library: the RTMP <-> MoQ gateway. The CLI lives in `moq-cli` (the `rtmp`
# subcommand); a relay can also embed `moq_rtmp::run` / `Server` against its own
# origin. Only rustls + tokio-rustls (RTMPS, the `tls` feature) are optional.
[dependencies]
anyhow = { version = "1", features = ["backtrace"] }
bytes = "1"
futures = "0.3"
moq-mux = { workspace = true }
moq-net = { workspace = true }
# Pure-Rust RTMP (no librtmp / ffmpeg): handshake + chunk codec + the
# server-session state machine. RTMP carries FLV, demuxed by moq-mux.
rml_rtmp = "0.8"
rustls = { version = "0.23", default-features = false, features = ["aws-lc-rs"], optional = true }
# TCP keepalive on accepted sockets, so a half-open connection (a peer that
# vanished without a FIN/RST) is reaped instead of pinning a broadcast and its
# stream-key slot forever.
socket2 = "0.6"
thiserror = "2"
tokio = { workspace = true, features = ["full"] }
# RTMPS: TLS-terminate accepted connections. Mirrors moq-relay's pinning so the
# workspace shares one tokio-rustls; the crypto provider comes from the supplied
# `rustls::ServerConfig`, so no default crypto feature is needed here.
tokio-rustls = { version = "0.26", default-features = false, optional = true }
tracing = "0.1"

[dev-dependencies]
# The RTMPS test borrows moq-native's self-signed cert generation to build a
# `rustls::ServerConfig`; `quinn` pulls in a backend so `tls::Server` is built.
moq-native = { workspace = true, default-features = false, features = ["aws-lc-rs", "quinn"] }
