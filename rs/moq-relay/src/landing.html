<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>moq-relay</title>
		<style>
			:root {
				color-scheme: light dark;
			}
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				font-family:
					system-ui,
					-apple-system,
					Segoe UI,
					Roboto,
					Ubuntu,
					sans-serif;
			}
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 2rem;
				box-sizing: border-box;
				background: #0b0d10;
				color: #e5e7eb;
			}
			main {
				max-width: 40rem;
				text-align: center;
			}
			h1 {
				font-size: 1.5rem;
				margin: 0 0 1rem;
			}
			p {
				margin: 0 0 1rem;
				line-height: 1.5;
			}
			a {
				color: #60a5fa;
			}
			code {
				background: rgba(255, 255, 255, 0.08);
				padding: 0.1rem 0.35rem;
				border-radius: 0.25rem;
				font-size: 0.95em;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>moq-relay</h1>
			<p>
				This is a <code>moq-relay</code> instance, and you're not a MoQ client.
			</p>
			<p>
				See <a href="https://moq.dev">https://moq.dev</a> for more info.
			</p>
		</main>
	</body>
</html>
