[package]
name = "moq-net"
description = "The networking layer for Media over QUIC: real-time pub/sub with built-in caching, fan-out, and prioritization."
authors = ["Luke Curley"]
repository = "https://github.com/moq-dev/moq"
license = "MIT OR Apache-2.0"

version = "0.1.13"
edition = "2024"
rust-version.workspace = true

keywords = ["quic", "http3", "webtransport", "media", "live"]
categories = ["multimedia", "network-programming", "web-programming"]

[features]
# Legacy no-op: serde is now unconditional (stats publishing requires it).
serde = []

[dependencies]
bytes = "1"
futures = "0.3"
kio = { workspace = true }
num_enum = "0.7"
rand = "0.10.1"
serde = { workspace = true, features = ["rc"] }
serde_json = "1"
thiserror = "2"
tokio = { workspace = true, features = ["macros", "io-util", "sync", "test-util", "time"] }
tracing = "0.1"
web-async = { workspace = true }
web-transport-trait = { workspace = true }
