[package]
name = "moq-srt"
description = "Bidirectional SRT gateway for Media over QUIC"
authors = ["Luke Curley <kixelated@gmail.com>"]
repository = "https://github.com/moq-dev/moq"
license = "MIT OR Apache-2.0"

version = "0.0.1"
edition = "2024"
rust-version.workspace = true

keywords = ["srt", "moq", "media", "live", "mpeg-ts"]
categories = ["multimedia", "network-programming", "web-programming"]

[lib]
doctest = false

# Pure library: the SRT <-> MoQ gateway. The CLI lives in `moq-cli` (the `srt`
# subcommand); a relay can also embed `moq_srt::run` / `Server` against its own
# origin.
[dependencies]
anyhow = { version = "1", features = ["backtrace"] }
bytes = "1"
futures = "0.3"
moq-mux = { workspace = true }
moq-net = { workspace = true }
# Pure-Rust SRT (no libsrt / ffmpeg). SRT carries MPEG-TS, demuxed by moq-mux.
srt-tokio = "0.4"
thiserror = "2"
tokio = { workspace = true, features = ["full"] }
tracing = "0.1"
