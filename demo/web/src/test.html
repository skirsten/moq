<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>MoQ test page</title>

		<style>
			body {
				margin: 0;
				padding: 12px;
				background: #000;
				color: #ddd;
				font:
					12px/1.4 ui-monospace,
					SFMono-Regular,
					Menlo,
					monospace;
			}

			moq-watch {
				display: block;
			}
			canvas {
				width: 100%;
				max-width: 960px;
				height: auto;
				background: #111;
			}

			#debug {
				margin-top: 12px;
			}
			#debug h3 {
				margin: 10px 0 4px;
				font-size: 13px;
				color: #fff;
				border-bottom: 1px solid #333;
				padding-bottom: 2px;
			}
			#debug dl {
				display: grid;
				grid-template-columns: 200px 1fr;
				gap: 0 12px;
				margin: 0;
			}
			#debug dt {
				color: #888;
			}
			#debug dd {
				margin: 0;
				word-break: break-all;
			}
			.ok {
				color: #4ade80;
			}
			.bad {
				color: #f87171;
			}
		</style>
	</head>

	<body>
		<!--
		Minimal player: just <moq-watch> with a canvas. No <moq-watch-ui>, no
		<moq-discover>, no <moq-watch-support>, no docs. URL + broadcast come
		from query string; the runner in tests/browser/ targets this page when
		config.yml sets page: local.
	-->
		<moq-watch id="watch" url="https://cdn.moq.dev/demo" name="bbb" latency="real-time" reload>
			<canvas></canvas>
		</moq-watch>

		<div id="debug">
			<h3>environment</h3>
			<dl id="env"></dl>

			<h3>features</h3>
			<dl id="features"></dl>

			<h3>audio context</h3>
			<dl id="audio"></dl>

			<h3>stats</h3>
			<dl id="stats"></dl>
		</div>

		<script type="module" src="test.ts"></script>
	</body>
</html>
