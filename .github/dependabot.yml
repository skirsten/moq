# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# cooldown.default-days holds back any newly published version until it is at
# least N days old. This buys time for a compromised release (supply-chain
# attack) to be noticed and yanked before we pull it in. Security updates
# bypass the cooldown. It only gates Dependabot-driven updates, not a manual
# `cargo update` / `bun update` / `uv lock`.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      cargo:
        patterns:
          - "*"
    ignore:
      # reqwest-middleware 0.5 requires reqwest 0.13, but http-cache-reqwest's
      # latest stable (0.16) still pins reqwest 0.12 / reqwest-middleware 0.4.
      # The only pairing is http-cache-reqwest 1.0.0-alpha (pre-release), so we
      # hold reqwest-middleware at 0.4 until that line ships stable.
      - dependency-name: "reqwest-middleware"
        versions: [">=0.5"]

  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      bun:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      uv:
        patterns:
          - "*"
