name: Smoke

permissions:
  id-token: write
  contents: read

on:
  # Manual on-demand runs.
  workflow_dispatch:
  # Nightly: catches cross-language interop drift from dependency/toolchain
  # bumps that a path-filtered PR run wouldn't see.
  schedule:
    - cron: "0 7 * * *"

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    # The matrix runs in real time (ffmpeg -re pacing + per-subscriber timeouts);
    # this is just a safety net against a hung relay/client.
    timeout-minutes: 30

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main
        with:
          determinate: false
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main
      - uses: DeterminateSystems/flake-checker-action@ba1df9ab06e525ea302f2a56f5e182f33cfd14fa # main

      # Cache Rust dependencies and build artifacts (relay + cli + moq-ffi).
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      # Full matrix incl. the headless-browser client. Browser cells are heavier
      # (Chromium) so the default `just test smoke` stays rust,python; the nightly
      # exercises everything. --timeout 30 gives Chromium cold-start headroom.
      - run: nix develop --command just test smoke --publishers rust,python,js-browser --subscribers rust,python,js-browser --timeout 30
