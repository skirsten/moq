name: Update Flake

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 12 1 * *' # Run monthly on the 1st at noon UTC

jobs:
  update-flake:
    name: Update flake.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@b83e0671a67dfd774680fb1beaa1497ef7e58bfc # main
        with:
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
