name: Release Py

# Driven by the `moq-ffi-v*` tag that release-plz pushes when it bumps
# rs/moq-ffi/Cargo.toml. The wheel inherits its version from that same
# Cargo.toml (via maturin's dynamic version), so the moq-net package
# stays lockstep with the moq-ffi crate without a separate bump.

on:
  push:
    tags:
      - "moq-ffi-v*"

permissions:
  contents: read

concurrency:
  group: release-py
  cancel-in-progress: false

jobs:
  parse-version:
    name: Parse version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Parse version from tag
        id: parse
        run: .github/scripts/release.sh parse-version moq-ffi

      # Maturin reads the wheel version from rs/moq-ffi/Cargo.toml (via
      # `dynamic = ["version"]` in pyproject.toml). If a tag is pushed by
      # hand without bumping Cargo.toml first, the wheel would ship with
      # the previous version and PyPI would reject the duplicate upload.
      - name: Verify Cargo.toml matches tag
        env:
          TAG_VERSION: ${{ steps.parse.outputs.version }}
        run: |
          CARGO_VERSION=$(grep '^version' rs/moq-ffi/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match rs/moq-ffi/Cargo.toml version ($CARGO_VERSION). Bump Cargo.toml before tagging."
            exit 1
          fi
          echo "Cargo.toml version matches tag: $TAG_VERSION"

  build:
    name: Build wheels (${{ matrix.target }})
    needs: [parse-version]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            # Use manylinux_2_28 for aarch64-linux to get a newer GCC.
            # manylinux2014 ships GCC 4.8.5 which can't compile aws-lc-sys.
            manylinux: 2_28
            # The cross image sets TARGET_CC/CXX which leaks into host builds.
            before-script-linux: "unset TARGET_CC TARGET_CXX"
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          # py/moq-net/pyproject.toml drives the build; its [tool.maturin]
          # block points at rs/moq-ffi/Cargo.toml.
          working-directory: py/moq-net
          args: --release --out dist
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          before-script-linux: ${{ matrix.before-script-linux || '' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.target }}
          path: py/moq-net/dist/*.whl

  sdist:
    name: Build sdist
    needs: [parse-version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: py/moq-net
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: py/moq-net/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    # Skipped until PUBLISH_PYTHON=true is set in repo variables.
    if: vars.PUBLISH_PYTHON == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/moq-net
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
