name: libmoq

on:
  push:
    tags:
      - "libmoq-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_nix: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_nix: true
          # Both Apple targets build on the Apple Silicon runner: the
          # Determinate Nix installer dropped Intel macOS, so x86_64 is
          # cross-compiled (Apple clang is multi-arch). libmoq.a needs no
          # execution, so no Rosetta. See rs/libmoq/build.sh.
          - target: x86_64-apple-darwin
            os: macos-latest
            use_nix: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_nix: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_nix: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        if: matrix.use_nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      - name: Install Rust (Windows)
        if: '!matrix.use_nix'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version libmoq

      - name: Build and package
        shell: bash
        run: |
          ./rs/libmoq/build.sh \
            --target ${{ matrix.target }} \
            --version ${{ steps.parse.outputs.version }} \
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: libmoq-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version libmoq

      - name: Find previous tag
        id: prev_tag
        run: .github/scripts/release.sh prev-tag libmoq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: "libmoq v${{ steps.parse.outputs.version }}"
          RELEASE_PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: .github/scripts/release.sh create artifacts
