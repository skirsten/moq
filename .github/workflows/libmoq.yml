name: libmoq

on:
  push:
    tags:
      - "libmoq-v*"
  pull_request:
    paths:
      - ".github/workflows/libmoq.yml"
      - ".github/scripts/release.sh"
      - "rs/libmoq/build.sh"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_nix: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_nix: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            use_nix: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_nix: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_nix: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        if: matrix.use_nix
        uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main
        with:
          determinate: false
      - name: Configure Nix cache
        if: matrix.use_nix
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main

      - name: Install Rust (Windows)
        if: '!matrix.use_nix'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Parse version
        id: parse
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            CARGO_VERSION=$(grep '^version' rs/libmoq/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
            echo "Using version from Cargo.toml (PR dry-run): $CARGO_VERSION"
          else
            .github/scripts/release.sh parse-version libmoq
          fi

      - name: Build and package
        shell: bash
        run: |
          ./rs/libmoq/build.sh \
            --target ${{ matrix.target }} \
            --version ${{ steps.parse.outputs.version }} \
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: libmoq-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version libmoq

      - name: Find previous tag
        id: prev_tag
        run: .github/scripts/release.sh prev-tag libmoq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: "libmoq v${{ steps.parse.outputs.version }}"
          RELEASE_PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: .github/scripts/release.sh create artifacts
