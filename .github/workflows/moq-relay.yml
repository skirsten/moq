name: moq-relay

on:
  push:
    tags:
      - "moq-relay-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version moq-relay

      - name: Build
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} -p moq-relay \
            --config "target.aarch64-unknown-linux-gnu.linker='aarch64-linux-gnu-gcc'"

      - name: Package
        shell: bash
        run: |
          version="${{ steps.parse.outputs.version }}"
          target="${{ matrix.target }}"
          name="moq-relay-v${version}-${target}"

          mkdir -p dist
          cp "target/${target}/release/moq-relay" "dist/${name}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: moq-relay-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version moq-relay

      - name: Find previous tag
        id: prev_tag
        run: .github/scripts/release.sh prev-tag moq-relay

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: "moq-relay v${{ steps.parse.outputs.version }}"
          RELEASE_PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: .github/scripts/release.sh create artifacts
