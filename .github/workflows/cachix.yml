name: Cachix

on:
  push:
    tags:
      - 'moq-relay-v*'
      - 'moq-token-cli-v*'
      - 'moq-cli-v*'
      - 'moq-boy-v*'
      - 'libmoq-v*'
      - 'moq-gst-v*'

jobs:
  # Build and push only the package the tag names. The tag prefix
  # (e.g. moq-relay) maps 1:1 to a flake attribute.
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # `os` is just the cache pin label; keep the existing values stable so
          # old pins aren't orphaned.
          - os: ubuntu-latest # x86_64-linux
            runs-on: ubuntu-latest
          - os: macos-latest # aarch64-darwin
            runs-on: macos-latest
          # aarch64-linux on the moq-dev self-hosted A1 (warm /nix/store). Tag
          # pushes are trusted, so no fork concern.
          - os: aarch64-linux
            runs-on: [self-hosted, nix]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # Full-match REF_NAME against the same <prefix>-v<semver> contract
      # release.sh enforces, so a malformed tag fails fast instead of
      # building under a trusted identity.
      - name: Derive package from tag
        id: pkg
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          re='^(moq-relay|moq-cli|moq-token-cli|moq-boy|libmoq|moq-gst)-v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$'
          if [[ ! "$REF_NAME" =~ $re ]]; then
            echo "Tag format not recognized: $REF_NAME" >&2
            exit 1
          fi
          echo "name=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      # The cachix action and `nix build` below run `nix` directly, so put it on
      # PATH. A login shell resolves it via /etc/profile.d regardless of the
      # box's install path. Self-hosted only; the hosted runners get Nix from
      # the installer step.
      - name: Add Nix to PATH
        if: runner.environment == 'self-hosted'
        shell: bash -leo pipefail {0}
        run: dirname "$(command -v nix)" >> "$GITHUB_PATH"

      - if: runner.environment == 'github-hosted'
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: kixelated
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # The self-hosted box's runner user isn't a Nix trusted-user and the
          # box deliberately substitutes only from its warm local store, so
          # don't let `cachix use` rewrite nix.conf there. Push auth (above)
          # still works; this leg only pushes.
          skipAddingSubstituter: ${{ runner.environment == 'self-hosted' }}

      - name: Build and cache
        env:
          PACKAGE: ${{ steps.pkg.outputs.name }}
          OS: ${{ matrix.os }}
        run: |
          nix build ".#$PACKAGE" --print-build-logs
          cachix push kixelated ./result
          # Pin so released paths are exempt from GC, otherwise a consumer
          # pinning a few-weeks-old tag silently falls back to building once
          # the cache GCs the path. keep-revisions bounds storage for the
          # free plan; the pin name is per package+OS so each platform keeps
          # its own last-N releases instead of clobbering the other's.
          cachix pin kixelated "$PACKAGE-$OS" ./result --keep-revisions 10
